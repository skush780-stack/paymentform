<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment form</title>
  </head>
  <body>
    <form action="">
      <h1>Payment form</h1>
      <p>required fileds are followed by *</p>
      <h2>Contact Information</h2>
      <p>Name: * <input type="text" name="name" required></p>
      <fieldset>
        <legend>Gender * </legend>
        <p>
          Male:<input type="radio" name="gender" id="male" required> female <input
            type="radio"
            name="gender"
            id="female" required>
          
        </p>
      </fieldset>
      <p>Address: <textarea name="address" id="address" cols="75" rows="6"></textarea></p>
      <p>Email: * <input type="email" name="email" id="email" required></p>
      <p>Pincode: * <input type="number" name="Pincode" id="Pincode" required></p>
      <h2>Payment Information</h2>
      <p>Card Type: * 
        <select name="card_type" id="card_type" required>
          <option value="">--Select A Card Type</option>
          <option value="Visa">Visa</option>
          <option value="Rupay">Rupay</option>
          <option value="Master Card">Mastercard</option>
        </select>
          </p>
          <p>
            Card Number: * <input type="number" name="" id="" required> 
          </p>
          <p>
            Expiration Date: * <input type="date" name="exp_date" id="exp_date" required>
          </p>
          <p>
            CVV Number: * <input type="password" name="cvv" id="cvv" required>
          </p>
          <input type="submit" value="pay now">
    </form>
  </body>
</html>
